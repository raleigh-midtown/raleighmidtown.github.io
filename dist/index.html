<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midtown Raleigh 3D Explorer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #loading-overlay {
        position: fixed;
        inset: 0;
        background: rgba(10, 15, 30, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        color: #fff;
        font-family: system-ui, sans-serif;
      }
      #loading-overlay.hidden {
        display: none;
      }
      #loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255,255,255,0.2);
        border-top-color: #4af;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #loading-text {
        font-size: 14px;
        color: rgba(255,255,255,0.7);
      }
      #error-overlay {
        position: fixed;
        inset: 0;
        background: rgba(30, 10, 10, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 101;
        color: #fff;
        font-family: system-ui, sans-serif;
      }
      #error-overlay.hidden {
        display: none;
      }
      #error-overlay h2 {
        font-size: 18px;
        margin-bottom: 8px;
        color: #f66;
      }
      #error-overlay p {
        font-size: 13px;
        color: rgba(255,255,255,0.6);
      }
      #mobile-banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.85);
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        padding: 10px 16px;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #mobile-banner.hidden {
        display: none;
      }
      #mobile-banner button {
        background: none;
        border: 1px solid rgba(255,255,255,0.4);
        color: #fff;
        cursor: pointer;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
      }
      #gyro-btn {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 50;
        background: rgba(0,0,0,0.75);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.4);
        font-family: system-ui, sans-serif;
        font-size: 13px;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        display: none;
      }
      #view-toggle-btn {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 50;
        background: rgba(0,0,0,0.75);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.4);
        font-family: system-ui, sans-serif;
        font-size: 13px;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
      }
      #view-toggle-btn:hover { background: rgba(0,0,0,0.9); }
      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.85);
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        padding: 10px 20px;
        border-radius: 8px;
        z-index: 200;
        display: none;
      }
      #controls-hint {
        position: fixed;
        bottom: 24px;
        left: 24px;
        z-index: 50;
        background: rgba(0,0,0,0.6);
        color: rgba(255,255,255,0.7);
        font-family: system-ui, sans-serif;
        font-size: 12px;
        padding: 8px 12px;
        border-radius: 6px;
        line-height: 1.6;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-DySIiuuU.js"></script>
  </head>
  <body>
    <div id="loading-overlay">
      <div id="loading-spinner"></div>
      <p id="loading-text">Loading Midtown Raleigh…</p>
    </div>
    <div id="error-overlay" class="hidden">
      <h2>Failed to load scene</h2>
      <p id="error-message">An unexpected error occurred.</p>
    </div>
    <div id="mobile-banner" class="hidden">
      Best experienced on desktop — mobile performance may vary.
      <button id="mobile-banner-close">✕</button>
    </div>
    <button id="gyro-btn">Enable Gyroscope</button>
    <button id="view-toggle-btn">Aerial view</button>
    <div id="toast"></div>
    <div id="controls-hint">
      WASD / Arrow keys — move<br>
      Space — jump<br>
      Drag — tilt (ground) / pan (aerial)<br>
      Scroll — zoom (aerial)
    </div>
  </body>
</html>
